name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare release package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          PACKAGE_NAME="BeeWeb-${VERSION}"
          mkdir -p "release/${PACKAGE_NAME}"
          cp -R dist "release/${PACKAGE_NAME}/dist"
          cp README.md "release/${PACKAGE_NAME}/README.md"
          cp WS_BACKEND_TEMPLATE.md "release/${PACKAGE_NAME}/WS_BACKEND_TEMPLATE.md"
          cp BACKEND_REFERENCE_DEMO.md "release/${PACKAGE_NAME}/BACKEND_REFERENCE_DEMO.md"
          cp docs.md "release/${PACKAGE_NAME}/docs.md"
          cp UPGRADE_PLAN.md "release/${PACKAGE_NAME}/UPGRADE_PLAN.md"
          cd release
          zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          PACKAGE_NAME="BeeWeb-${VERSION}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "release/${PACKAGE_NAME}.zip" --clobber
          else
            gh release create "$VERSION" "release/${PACKAGE_NAME}.zip" \
              --title "$VERSION" \
              --generate-notes
          fi
