<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AgentBee Web</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <h1>AgentBee Web</h1>
            <p>Vibe Anything</p>
        </div>

        <div class="side-actions">
            <button id="newSessionBtn" title="新建会话">新建</button>
            <button id="clearSessionBtn" title="清空当前会话">清空</button>
            <button id="exportBtn" title="导出当前会话">导出</button>
            <button id="deleteSessionBtn" title="删除当前会话">删除</button>
        </div>

        <div id="sessionList" class="sessions"></div>

        <div class="connection">
            <div class="field">
                <label for="wsUrl">WebSocket URL</label>
                <input type="text" id="wsUrl" value="ws://192.168.254.10:8686" placeholder="ws://host:port">
            </div>
            <div class="connect-row">
                <button id="connectBtn" class="connect">连接</button>
                <button id="disconnectBtn" class="disconnect" disabled>断开</button>
            </div>
            <div class="status-pill">
                <span id="statusDot" class="dot"></span>
                <span id="statusLabel">未连接</span>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-title">
                <strong id="activeTitle">新会话</strong>
                <span id="activeMeta">等待连接</span>
            </div>
            <div class="topbar-actions">
                <button id="stopBtn" title="停止生成" disabled>停</button>
                <button id="scrollBtn" title="滚动到底部">底</button>
            </div>
        </header>

        <section id="chatContainer" class="chat-area"></section>

        <footer class="composer">
            <textarea id="messageInput" rows="1" placeholder="输入消息，Ctrl+Enter 或 Cmd+Enter 发送" disabled></textarea>
            <button id="sendBtn" class="send" disabled>发送</button>
        </footer>
    </main>
</div>

<script src="./app.js"></script>
</body>
</html>
