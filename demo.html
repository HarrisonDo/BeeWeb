<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AgentBee Web</title>
    <style>
        :root {
            --bg: #12151b;
            --panel: #1a1f28;
            --panel-2: #202733;
            --panel-3: #283140;
            --line: #364253;
            --text: #edf2f7;
            --muted: #9aa7b7;
            --accent: #4b82f0;
            --accent-2: #23b38f;
            --danger: #d85c6f;
            --warn: #d89f45;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(75, 130, 240, 0.16), transparent 34rem),
                linear-gradient(145deg, #101217 0%, #161b22 45%, #101419 100%);
            overflow: hidden;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button,
        select {
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text);
            background: var(--panel-3);
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s, transform 0.18s;
        }

        button:hover,
        select:hover {
            background: #314059;
            border-color: #52647d;
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .app {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            height: 100vh;
            padding: 16px;
            gap: 16px;
        }

        .sidebar,
        .main {
            min-height: 0;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(26, 31, 40, 0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            border-radius: 14px;
            overflow: hidden;
        }

        .brand {
            padding: 18px;
            border-bottom: 1px solid var(--line);
        }

        .brand h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0;
        }

        .brand p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.45;
        }

        .side-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid var(--line);
        }

        .side-actions button {
            padding: 9px 10px;
            font-size: 0.84rem;
        }

        .sessions {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            width: 100%;
            display: grid;
            gap: 4px;
            padding: 10px;
            margin-bottom: 8px;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
        }

        .session-item.active {
            background: rgba(75, 130, 240, 0.16);
            border-color: rgba(75, 130, 240, 0.45);
        }

        .session-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .session-meta {
            color: var(--muted);
            font-size: 0.72rem;
        }

        .connection {
            padding: 12px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 10px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            color: var(--muted);
            font-size: 0.75rem;
        }

        .field input,
        .field select {
            width: 100%;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 9px 10px;
            color: var(--text);
            background: #11161e;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--accent);
        }

        .connect-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .connect {
            background: var(--accent);
        }

        .disconnect {
            background: #63303a;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.78rem;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--danger);
            box-shadow: 0 0 0 4px rgba(216, 92, 111, 0.1);
        }

        .dot.connected {
            background: var(--accent-2);
            box-shadow: 0 0 0 4px rgba(35, 179, 143, 0.12);
        }

        .main {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            border-radius: 14px;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--line);
            background: rgba(32, 39, 51, 0.72);
        }

        .topbar-title {
            min-width: 0;
        }

        .topbar-title strong,
        .topbar-title span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-title strong {
            font-size: 1rem;
        }

        .topbar-title span {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .topbar-actions button {
            width: 38px;
            height: 34px;
            padding: 0;
        }

        .chat-area {
            min-height: 0;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .empty {
            margin: auto;
            max-width: 420px;
            color: var(--muted);
            text-align: center;
            line-height: 1.7;
        }

        .message {
            display: grid;
            gap: 6px;
            max-width: min(760px, 86%);
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant,
        .message.system,
        .message.error,
        .message.tool {
            align-self: flex-start;
        }

        .bubble {
            padding: 11px 13px;
            border-radius: 10px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            line-height: 1.55;
            font-size: 0.94rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .user .bubble {
            background: linear-gradient(135deg, #3f7def, #3269ce);
        }

        .assistant .bubble {
            background: #202733;
        }

        .system .bubble {
            color: #d2dae6;
            background: rgba(75, 130, 240, 0.12);
            border-color: rgba(75, 130, 240, 0.26);
        }

        .error .bubble {
            color: #ffe9ed;
            background: rgba(216, 92, 111, 0.2);
            border-color: rgba(216, 92, 111, 0.4);
        }

        .tool .bubble {
            color: #ead9b2;
            background: rgba(216, 159, 69, 0.14);
            border-color: rgba(216, 159, 69, 0.32);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.84rem;
        }

        .meta {
            color: var(--muted);
            font-size: 0.72rem;
            padding: 0 4px;
        }

        .think {
            margin-bottom: 8px;
            padding: 8px 10px;
            color: #b8c0cc;
            border-left: 2px solid #52647d;
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.86rem;
            white-space: pre-wrap;
        }

        .composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            padding: 14px 18px;
            border-top: 1px solid var(--line);
            background: rgba(32, 39, 51, 0.72);
        }

        .composer textarea {
            min-height: 44px;
            max-height: 150px;
            resize: none;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 13px;
            color: var(--text);
            background: #11161e;
            outline: none;
            line-height: 1.45;
        }

        .composer textarea:focus {
            border-color: var(--accent);
        }

        .send {
            width: 86px;
            background: var(--accent-2);
        }

        @media (max-width: 820px) {
            body {
                overflow: auto;
            }

            .app {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
                padding: 10px;
            }

            .sidebar {
                min-height: 320px;
            }

            .main {
                height: calc(100vh - 20px);
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-actions {
                width: 100%;
            }

            .topbar-actions button {
                flex: 1;
            }

            .message {
                max-width: 96%;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <h1>AgentBee Web</h1>
            <p>Vibe Anything</p>
        </div>

        <div class="side-actions">
            <button id="newSessionBtn" title="新建会话">新建</button>
            <button id="clearSessionBtn" title="清空当前会话">清空</button>
            <button id="exportBtn" title="导出当前会话">导出</button>
            <button id="deleteSessionBtn" title="删除当前会话">删除</button>
        </div>

        <div id="sessionList" class="sessions"></div>

        <div class="connection">
            <div class="field">
                <label for="wsUrl">WebSocket URL</label>
                <input type="text" id="wsUrl" value="ws://192.168.254.10:8686" placeholder="ws://host:port">
            </div>
            <div class="field">
                <label for="sendMode">发送格式</label>
                <select id="sendMode">
                    <option value="raw" selected>纯文本（兼容当前后端）</option>
                    <option value="json">JSON 模板</option>
                </select>
            </div>
            <div class="connect-row">
                <button id="connectBtn" class="connect">连接</button>
                <button id="disconnectBtn" class="disconnect" disabled>断开</button>
            </div>
            <div class="status-pill">
                <span id="statusDot" class="dot"></span>
                <span id="statusLabel">未连接</span>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-title">
                <strong id="activeTitle">新会话</strong>
                <span id="activeMeta">等待连接</span>
            </div>
            <div class="topbar-actions">
                <button id="stopBtn" title="停止生成" disabled>停</button>
                <button id="scrollBtn" title="滚动到底部">底</button>
            </div>
        </header>

        <section id="chatContainer" class="chat-area"></section>

        <footer class="composer">
            <textarea id="messageInput" rows="1" placeholder="输入消息，Ctrl+Enter 或 Cmd+Enter 发送" disabled></textarea>
            <button id="sendBtn" class="send" disabled>发送</button>
        </footer>
    </main>
</div>

<script>
    const STORAGE_KEY = 'agentbee.sessions.v2';
    const DEFAULT_TITLE = '新会话';

    let ws = null;
    let connected = false;
    let sessions = [];
    let activeSessionId = null;
    let currentAssistantMessage = null;

    const wsUrlInput = document.getElementById('wsUrl');
    const sendModeInput = document.getElementById('sendMode');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusLabel = document.getElementById('statusLabel');
    const statusDot = document.getElementById('statusDot');
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scrollBtn = document.getElementById('scrollBtn');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const clearSessionBtn = document.getElementById('clearSessionBtn');
    const deleteSessionBtn = document.getElementById('deleteSessionBtn');
    const exportBtn = document.getElementById('exportBtn');
    const sessionList = document.getElementById('sessionList');
    const activeTitle = document.getElementById('activeTitle');
    const activeMeta = document.getElementById('activeMeta');

    function nowTime() {
        return new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
    }

    function makeId() {
        if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
        return `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadSessions() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            sessions = Array.isArray(saved) ? saved : [];
        } catch (e) {
            sessions = [];
        }

        if (!sessions.length) {
            createSession(false);
        } else {
            activeSessionId = sessions[0].id;
        }
    }

    function saveSessions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function getActiveSession() {
        return sessions.find((session) => session.id === activeSessionId) || sessions[0];
    }

    function createSession(render = true) {
        const session = {
            id: makeId(),
            title: DEFAULT_TITLE,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            messages: []
        };
        sessions.unshift(session);
        activeSessionId = session.id;
        currentAssistantMessage = null;
        saveSessions();
        if (render) renderAll();
        return session;
    }

    function touchSession(session) {
        session.updatedAt = new Date().toISOString();
        sessions = [session, ...sessions.filter((item) => item.id !== session.id)];
        activeSessionId = session.id;
    }

    function updateTitleFromMessage(session, text) {
        if (session.title !== DEFAULT_TITLE) return;
        const compact = text.replace(/\s+/g, ' ').trim();
        session.title = compact.slice(0, 24) || DEFAULT_TITLE;
    }

    function addMessage(role, content, extra = {}) {
        const session = getActiveSession() || createSession(false);
        const message = {
            id: makeId(),
            role,
            content: content || '',
            time: nowTime(),
            ...extra
        };
        session.messages.push(message);
        touchSession(session);
        saveSessions();
        renderAll();
        return message;
    }

    function appendAssistantContent(text) {
        const session = getActiveSession() || createSession(false);
        if (!currentAssistantMessage) {
            currentAssistantMessage = {
                id: makeId(),
                role: 'assistant',
                content: '',
                think: '',
                time: nowTime()
            };
            session.messages.push(currentAssistantMessage);
        }
        currentAssistantMessage.content += text || '';
        touchSession(session);
        saveSessions();
        renderAll();
    }

    function appendAssistantThink(text) {
        const session = getActiveSession() || createSession(false);
        if (!currentAssistantMessage) {
            currentAssistantMessage = {
                id: makeId(),
                role: 'assistant',
                content: '',
                think: '',
                time: nowTime()
            };
            session.messages.push(currentAssistantMessage);
        }
        currentAssistantMessage.think = `${currentAssistantMessage.think || ''}${text || ''}`;
        touchSession(session);
        saveSessions();
        renderAll();
    }

    function finishAssistantMessage() {
        currentAssistantMessage = null;
        stopBtn.disabled = true;
        saveSessions();
        renderAll();
    }

    function normalizePayload(msg) {
        const data = msg.data ?? msg.text ?? msg.content ?? msg.delta ?? '';
        return typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    function handleServerMessage(raw) {
        let msg = null;
        if (typeof raw === 'string') {
            try {
                msg = JSON.parse(raw);
            } catch (e) {
                appendAssistantContent(raw);
                return;
            }
        }

        if (!msg || typeof msg !== 'object') return;

        const type = msg.type || msg.event || msg.role;
        if (type === 'content' || type === 'assistant' || type === 'message') {
            appendAssistantContent(normalizePayload(msg));
            return;
        }

        if (type === 'think' || type === 'thinking' || type === 'status') {
            appendAssistantThink(normalizePayload(msg));
            return;
        }

        if (type === 'tool_call' || type === 'tool') {
            addMessage('tool', JSON.stringify({
                name: msg.name || msg.tool || 'tool',
                args: msg.args || msg.arguments || msg.data || {}
            }, null, 2));
            return;
        }

        if (type === 'tool_result') {
            addMessage('tool', JSON.stringify({
                ok: msg.ok !== false,
                result: msg.result ?? msg.data ?? msg.content ?? ''
            }, null, 2));
            return;
        }

        if (type === 'error') {
            addMessage('error', msg.message || normalizePayload(msg) || '服务返回错误');
            finishAssistantMessage();
            return;
        }

        if (type === 'end' || type === 'done' || type === 'finish') {
            finishAssistantMessage();
            return;
        }

        appendAssistantContent(JSON.stringify(msg, null, 2));
    }

    function connectWebSocket() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            addMessage('system', '已有连接，请先断开');
            return;
        }

        const url = wsUrlInput.value.trim();
        if (!/^wss?:\/\//.test(url)) {
            addMessage('error', 'WebSocket 地址必须以 ws:// 或 wss:// 开头');
            return;
        }

        addMessage('system', `正在连接 ${url}`);
        ws = new WebSocket(url);

        ws.onopen = () => {
            setConnected(true);
            localStorage.setItem('agentbee.lastUrl', url);
            addMessage('system', 'WebSocket 连接已建立');
            messageInput.focus();
        };

        ws.onmessage = (event) => {
            if (typeof event.data === 'string') {
                handleServerMessage(event.data);
            }
        };

        ws.onerror = () => {
            addMessage('error', 'WebSocket 连接错误，请查看浏览器控制台');
        };

        ws.onclose = (event) => {
            setConnected(false);
            const reason = event.reason ? `，原因：${event.reason}` : '';
            addMessage('system', `连接已关闭 code=${event.code}${reason}`);
            ws = null;
        };
    }

    function disconnectWebSocket() {
        if (ws) {
            ws.close(1000, '用户主动断开');
        } else {
            setConnected(false);
        }
    }

    function setConnected(nextConnected) {
        connected = nextConnected;
        connectBtn.disabled = connected;
        disconnectBtn.disabled = !connected;
        messageInput.disabled = !connected;
        sendBtn.disabled = !connected;
        stopBtn.disabled = !connected || !currentAssistantMessage;
        wsUrlInput.disabled = connected;
        statusDot.classList.toggle('connected', connected);
        statusLabel.textContent = connected ? '已连接' : '未连接';
        updateActiveMeta();
    }

    function sendMessage() {
        if (!connected || !ws || ws.readyState !== WebSocket.OPEN) {
            addMessage('error', '未连接，无法发送消息');
            return;
        }

        const text = messageInput.value.trim();
        if (!text) return;

        const session = getActiveSession() || createSession(false);
        updateTitleFromMessage(session, text);
        addMessage('user', text);

        const payload = sendModeInput.value === 'json'
            ? JSON.stringify({ type: 'user_message', sessionId: session.id, message: text })
            : text;

        ws.send(payload);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        currentAssistantMessage = null;
        stopBtn.disabled = false;
    }

    function stopCurrent() {
        if (!connected || !ws || ws.readyState !== WebSocket.OPEN) return;
        const session = getActiveSession();
        ws.send(JSON.stringify({ type: 'stop', sessionId: session ? session.id : null }));
        addMessage('system', '已发送停止请求');
        finishAssistantMessage();
    }

    function clearCurrentSession() {
        const session = getActiveSession();
        if (!session) return;
        session.messages = [];
        session.title = DEFAULT_TITLE;
        session.updatedAt = new Date().toISOString();
        currentAssistantMessage = null;
        saveSessions();
        renderAll();
    }

    function deleteCurrentSession() {
        if (!sessions.length) return;
        sessions = sessions.filter((session) => session.id !== activeSessionId);
        if (!sessions.length) {
            createSession(false);
        } else {
            activeSessionId = sessions[0].id;
        }
        currentAssistantMessage = null;
        saveSessions();
        renderAll();
    }

    function exportCurrentSession() {
        const session = getActiveSession();
        if (!session) return;
        const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${session.title || 'agentbee-session'}.json`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function renderSessions() {
        sessionList.innerHTML = '';
        sessions.forEach((session) => {
            const btn = document.createElement('button');
            btn.className = `session-item${session.id === activeSessionId ? ' active' : ''}`;
            btn.title = session.title;
            btn.innerHTML = `
                <span class="session-title">${escapeHtml(session.title)}</span>
                <span class="session-meta">${session.messages.length} 条 · ${formatDate(session.updatedAt)}</span>
            `;
            btn.addEventListener('click', () => {
                activeSessionId = session.id;
                currentAssistantMessage = null;
                renderAll();
            });
            sessionList.appendChild(btn);
        });
    }

    function renderMessages() {
        const session = getActiveSession();
        chatContainer.innerHTML = '';

        if (!session || !session.messages.length) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = '连接后即可开始对话。当前页面会在浏览器本地保存聊天记录。';
            chatContainer.appendChild(empty);
            return;
        }

        session.messages.forEach((message) => {
            const row = document.createElement('article');
            row.className = `message ${message.role}`;
            const roleName = {
                user: '我',
                assistant: 'AgentBee',
                system: '系统',
                error: '错误',
                tool: '工具'
            }[message.role] || message.role;

            const think = message.think
                ? `<div class="think">${escapeHtml(message.think)}</div>`
                : '';

            row.innerHTML = `
                <div class="meta">${roleName} · ${message.time || ''}</div>
                <div class="bubble">${think}${escapeHtml(message.content || '')}</div>
            `;
            chatContainer.appendChild(row);
        });

        scrollToBottom();
    }

    function renderAll() {
        renderSessions();
        renderMessages();
        updateActiveMeta();
    }

    function updateActiveMeta() {
        const session = getActiveSession();
        activeTitle.textContent = session ? session.title : DEFAULT_TITLE;
        const url = wsUrlInput.value.trim();
        activeMeta.textContent = `${connected ? '已连接' : '等待连接'} · ${url || '未设置 URL'}`;
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
        return String(str || '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = `${Math.min(150, this.scrollHeight)}px`;
    });

    messageInput.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    });

    wsUrlInput.addEventListener('input', () => {
        localStorage.setItem('agentbee.lastUrl', wsUrlInput.value.trim());
        updateActiveMeta();
    });

    sendModeInput.addEventListener('change', () => {
        localStorage.setItem('agentbee.sendMode', sendModeInput.value);
    });

    connectBtn.addEventListener('click', connectWebSocket);
    disconnectBtn.addEventListener('click', disconnectWebSocket);
    sendBtn.addEventListener('click', sendMessage);
    stopBtn.addEventListener('click', stopCurrent);
    scrollBtn.addEventListener('click', scrollToBottom);
    newSessionBtn.addEventListener('click', () => createSession(true));
    clearSessionBtn.addEventListener('click', clearCurrentSession);
    deleteSessionBtn.addEventListener('click', deleteCurrentSession);
    exportBtn.addEventListener('click', exportCurrentSession);

    const lastUrl = localStorage.getItem('agentbee.lastUrl');
    const lastMode = localStorage.getItem('agentbee.sendMode');
    if (lastUrl) wsUrlInput.value = lastUrl;
    if (lastMode) sendModeInput.value = lastMode;

    loadSessions();
    renderAll();
</script>
</body>
</html>
